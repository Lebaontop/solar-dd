<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان سولار - النسخة الأصلية المطورة</title>
    <style>
        :root {
            --glow-cyan: #4facfe;
            --neon-blue: #00f2fe;
            --danger: #ff4b2b;
            --galaxy: linear-gradient(90deg, #3a1c71, #d76d77, #ffaf7b, #4facfe);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050510;
            color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            position: relative;
        }

        /* الخلفية المتحركة bg.jpd */
        .animated-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpd') center/cover no-repeat;
            z-index: -2; animation: spaceMove 50s linear infinite alternate;
        }
        @keyframes spaceMove {
            from { transform: scale(1.1) translate(0, 0); }
            to { transform: scale(1.2) translate(-20px, -20px); }
        }

        /* اللوحات الإضافية */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 4000; justify-content: center; align-items: center; }
        .content-box { background: rgba(20,20,40,0.95); padding: 30px; border-radius: 20px; border: 2px solid var(--glow-cyan); max-width: 400px; text-align: right; }

        .controls-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-ctrl { background: rgba(0,0,0,0.6); border: 1px solid white; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }

        .main-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 30px; width: 90%; max-width: 850px; text-align: center;
            position: relative; z-index: 2; transition: opacity 0.3s;
        }
        .main-card.paused { opacity: 0.3; pointer-events: none; }

        .logo-text { font-size: 3.5rem; font-weight: 900; letter-spacing: 10px; background: var(--galaxy); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        
        /* --- الميزان الاحترافي (المربعات) --- */
        .balance-area { height: 200px; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 50px; position: relative; }
        
        /* قاعدة المثلث */
        .pivot-container { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 1; }
        .pivot-triangle { width: 0; height: 0; border-left: 30px solid transparent; border-right: 30px solid transparent; border-bottom: 50px solid rgba(255,255,255,0.2); }
        .pivot-point { width: 14px; height: 14px; background: #fff; border-radius: 50%; margin-bottom: -7px; position: relative; z-index: 10; box-shadow: 0 0 10px #fff; }

        /* المسطرة الجالكسي */
        .beam { 
            width: 480px; height: 6px; background: var(--galaxy); 
            box-shadow: 0 0 20px rgba(215, 109, 119, 0.6);
            position: absolute; bottom: 50px; left: 50%; margin-left: -240px; 
            transition: transform 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            border-radius: 10px; z-index: 5;
        }

        /* كفات المربعات (نفس الصورة) */
        .basket { 
            width: 105px; height: 75px; 
            border: 2px solid white; background: rgba(0,0,0,0.8); 
            position: absolute; top: 12px; border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .basket-l { left: -40px; } .basket-r { right: -40px; }
        .active-turn { border-color: var(--neon-blue); box-shadow: 0 0 25px var(--neon-blue); border-width: 3px; }

        .score-val { font-size: 2rem; font-weight: bold; margin: 0; }
        .team-label { font-size: 0.8rem; opacity: 0.7; }

        /* الأزرار */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 550px; margin: 0 auto; }
        .num-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 18px; font-size: 1.3rem; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .num-btn:disabled { opacity: 0.15; cursor: not-allowed; border-color: var(--danger); color: var(--danger); }

        #event-msg { display: none; position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); border: 2px solid var(--neon-blue); padding: 20px 40px; border-radius: 50px; z-index: 5000; box-shadow: 0 0 30px var(--neon-blue); font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="animated-bg"></div>
    <div id="event-msg">حدث فجائي!</div>

    <div class="overlay" id="rules-overlay">
        <div class="content-box">
            <h2 style="color:var(--glow-cyan)">📜 شروط المعركة</h2>
            <p>1. ممنوع تكرار نفس رقمك السابق.</p>
            <p>2. انتبه للوقت والأحداث العشوائية.</p>
            <button onclick="toggleOverlay('rules-overlay')" style="width:100%; padding:10px; cursor:pointer;">موافق</button>
        </div>
    </div>

    <div class="controls-top">
        <button class="btn-ctrl" onclick="toggleOverlay('rules-overlay')">📜 الشروط</button>
        <button class="btn-ctrl" onclick="togglePause()" id="p-btn" style="background: var(--glow-cyan); font-weight:bold;">ابدأ اللعب ▶️</button>
    </div>

    <div class="main-card paused" id="game-card">
        <div id="timer" style="font-size: 2.8rem; color: var(--danger); font-weight: bold;">10</div>
        <h1 class="logo-text">SOLAR</h1>
        <div style="margin-bottom: 20px; font-size: 1.5rem;">المجموع: <span id="total-val">0</span></div>

        <div class="balance-area">
            <div class="beam" id="beam">
                <div class="basket basket-l active-turn" id="b1">
                    <small class="team-label">فريق 1</small>
                    <p class="score-val" id="s1">0</p>
                </div>
                <div class="basket basket-r" id="b2">
                    <small class="team-label">فريق 2</small>
                    <p class="score-val" id="s2">0</p>
                </div>
            </div>
            <div class="pivot-container">
                <div class="pivot-point"></div>
                <div class="pivot-triangle"></div>
            </div>
        </div>

        <div class="grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn" id="btn-${i}" onclick="play(${i})">${i}</button>`);</script>
        </div>
        <div id="turn-info" style="margin-top:20px;">دور: <span id="active-p-name">فريق 1</span></div>
    </div>

    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="sound-boom" src="https://assets.mixkit.co/active_storage/sfx/147/147-preview.mp3"></audio>

    <script>
        let total=0, t1=0, t2=0, turn=1, max=80, timeLeft=10, timerId, isPaused=true, moves=0;
        let lastT1=null, lastT2=null;

        function toggleOverlay(id) { const el = document.getElementById(id); el.style.display = (el.style.display==='flex')?'none':'flex'; }
        
        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('p-btn');
            const card = document.getElementById('game-card');
            if(isPaused) { clearInterval(timerId); btn.innerText = "استكمال ▶️"; card.classList.add('paused'); }
            else { btn.innerText = "إيقاف مؤقت ⏸️"; card.classList.remove('paused'); startTimer(); }
        }

        function startTimer() {
            clearInterval(timerId);
            timeLeft = 10;
            document.getElementById('timer').innerText = timeLeft;
            timerId = setInterval(() => {
                if(!isPaused) {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if(timeLeft <= 0) endGame("انتهى الوقت! انفجر الميزان.");
                }
            }, 1000);
        }

        function play(v) {
            if(isPaused) return;
            document.getElementById('sound-click').play();
            total += v; moves++;

            if(turn === 1) { t1 += v; lastT1 = v; turn = 2; updateButtonStates(lastT2); }
            else { t2 += v; lastT2 = v; turn = 1; updateButtonStates(lastT1); }
            
            updateUI();
            if(moves % 5 === 0) triggerEvent();

            if(total >= max) endGame("بوووووم! تجاوزتم الحد.");
            else startTimer();
        }

        function updateButtonStates(restrictedNum) {
            for(let i=1; i<=10; i++) {
                const btn = document.getElementById(`btn-${i}`);
                btn.disabled = (i === restrictedNum);
            }
        }

        function triggerEvent() {
            const evs = ["🕳️ ثقب أسود: -10 نقاط", "☄️ نيازك: +10 نقاط", "🔋 شحن طاقة: الوقت 15ث"];
            const r = Math.floor(Math.random() * evs.length);
            const m = document.getElementById('event-msg');
            m.innerText = evs[r]; m.style.display = 'block';
            if(r===0) total = Math.max(0, total-10);
            if(r===1) total += 10;
            if(r===2) timeLeft = 15;
            updateUI();
            setTimeout(() => m.style.display = 'none', 3000);
        }

        function updateUI() {
            document.getElementById('total-val').innerText = total;
            document.getElementById('s1').innerText = t1;
            document.getElementById('s2').innerText = t2;
            let angle = (t1 - t2) * -1.8;
            if (angle > 28) angle = 28; if (angle < -28) angle = -28;
            
            document.getElementById('beam').style.transform = `rotate(${angle}deg)`;
            document.getElementById('b1').style.transform = `rotate(${-angle}deg)`;
            document.getElementById('b2').style.transform = `rotate(${-angle}deg)`;
            
            document.getElementById('active-p-name').innerText = (turn===1)?"فريق 1":"فريق 2";
            document.getElementById('b1').classList.toggle('active-turn', turn===1);
            document.getElementById('b2').classList.toggle('active-turn', turn===2);
        }

        function endGame(msg) {
            clearInterval(timerId);
            document.getElementById('sound-boom').play();
            alert(msg);
            location.reload();
        }
    </script>
</body>
</html>
