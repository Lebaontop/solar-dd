<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان سولار المتحرك - Solar Balance Animated</title>
    <style>
        :root {
            --glow-cyan: #4facfe;
            --neon-blue: #00f2fe;
            --galaxy-start: #3a1c71;
            --galaxy-mid: #d76d77;
            --galaxy-end: #ffaf7b;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #050510 url('bg.jpd') center/cover no-repeat fixed;
            color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            position: relative;
        }

        /* --- تأثير النجوم المتحركة --- */
        .stars-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: moveStar linear infinite, twinkle 2s ease-in-out infinite;
        }

        @keyframes moveStar {
            from { transform: translateY(0px); }
            to { transform: translateY(-1000px); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- تصميم اللوحة --- */
        .main-card {
            background-color: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 30px;
            width: 90%; max-width: 850px; text-align: center;
            position: relative; z-index: 2; box-shadow: 0 0 80px rgba(0, 0, 0, 0.6);
        }

        .logo-text {
            font-size: 3.8rem; font-weight: 900; letter-spacing: 12px;
            background: linear-gradient(135deg, var(--galaxy-start) 0%, var(--galaxy-mid) 50%, var(--galaxy-end) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(215, 109, 119, 0.5));
            margin: 0;
        }

        .logo-img { width: 90px; height: 90px; border: 2px solid white; border-radius: 18px; background: url('logo.png') center/cover no-repeat; }

        .balance-box { height: 130px; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 70px; }
        .beam { width: 480px; height: 6px; background: rgba(255, 255, 255, 0.6); position: relative; transition: transform 0.7s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .basket { width: 110px; height: 65px; border: 2px solid white; background: rgba(0, 0, 0, 0.7); position: absolute; bottom: -65px; border-radius: 0 0 60px 60px; display: flex; flex-direction: column; justify-content: center; }
        .basket-l { left: -55px; } .basket-r { right: -55px; }
        .active-turn { border-color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        .btn { background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255, 255, 255, 0.3); color: white; padding: 20px; font-size: 1.4rem; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--neon-blue); transform: translateY(-3px); box-shadow: 0 5px 20px var(--neon-blue); }

        .controls-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-control { background: rgba(0,0,0,0.6); border: 1px solid white; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        
        #timer-display { font-size: 2.5rem; color: #ff4b2b; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="controls-top">
        <button class="btn-control" onclick="togglePause()" id="pause-btn">⏸️ إيقاف</button>
        <button class="btn-control" onclick="toggleAdmin()">⚙️ الإعدادات</button>
    </div>

    <div class="admin-panel" id="admin" style="display: none; position: absolute; top: 70px; right: 20px; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px; z-index: 1001;">
        <input type="number" id="limit-input" value="80" style="width: 100%; margin-bottom: 10px;">
        <button onclick="applySettings()" style="width: 100%; background: var(--neon-blue); border: none; padding: 10px; color: white;">حفظ</button>
    </div>

    <div class="main-card" id="game-card">
        <div id="timer-display">10</div>
        <div class="header-area">
            <h1 class="logo-text">SOLAR</h1>
            <div class="logo-img"></div>
        </div>
        <div style="font-size: 1.5rem; margin-bottom: 20px;">المجموع: <span id="total-val">0</span></div>
        <div class="balance-box">
            <div class="beam" id="beam">
                <div class="basket basket-l active-turn" id="b1"><small>فريق 1</small><b id="s1">0</b></div>
                <div class="basket basket-r" id="b2"><small>فريق 2</small><b id="s2">0</b></div>
            </div>
        </div>
        <div class="grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="btn" onclick="play(${i})">${i}</button>`);</script>
        </div>
    </div>

    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="sound-boom" src="https://assets.mixkit.co/active_storage/sfx/147/147-preview.mp3"></audio>

    <script>
        // إنشاء النجوم برمجياً
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 50 + 50) + 's';
                star.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        let total = 0, t1 = 0, t2 = 0, turn = 1, max = 80, timer, timeLeft = 10, isPaused = false;

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    document.getElementById('timer-display').innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        document.getElementById('sound-boom').play();
                        alert("انتهى الوقت! انفجر الميزان");
                        reset();
                    }
                }
            }, 1000);
        }

        function play(v) {
            if (isPaused) return;
            document.getElementById('sound-click').play();
            total += v;
            if (turn === 1) {
                t1 += v; document.getElementById('s1').innerText = t1;
                turn = 2; document.getElementById('b1').classList.remove('active-turn'); document.getElementById('b2').classList.add('active-turn');
            } else {
                t2 += v; document.getElementById('s2').innerText = t2;
                turn = 1; document.getElementById('b2').classList.remove('active-turn'); document.getElementById('b1').classList.add('active-turn');
            }
            document.getElementById('total-val').innerText = total;
            document.getElementById('beam').style.transform = `rotate(${(t1 - t2) * -1.5}deg)`;
            
            if (total >= max) {
                clearInterval(timer);
                document.getElementById('sound-boom').play();
                alert("انفجر الميزان!");
                reset();
            } else {
                timeLeft = 10;
                document.getElementById('timer-display').innerText = timeLeft;
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "▶️ استمرار" : "⏸️ إيقاف";
            document.getElementById('game-card').style.opacity = isPaused ? "0.5" : "1";
        }

        function toggleAdmin() {
            const el = document.getElementById('admin');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function applySettings() {
            max = parseInt(document.getElementById('limit-input').value);
            toggleAdmin();
            reset();
        }

        function reset() {
            total = 0; t1 = 0; t2 = 0; turn = 1; timeLeft = 10;
            document.getElementById('total-val').innerText = "0";
            document.getElementById('s1').innerText = "0";
            document.getElementById('s2').innerText = "0";
            document.getElementById('beam').style.transform = "rotate(0deg)";
            startTimer();
        }

        startTimer();
    </script>
</body>
</html>
