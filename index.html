<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان سولار - Solar Balance</title>
    <style>
        :root {
            --glow-cyan: #4facfe;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* لون احتياطي غامق في حال لم تظهر الخلفية */
            background-color: #050510; 
            /* استدعاء الخلفية بمسار مباشر */
            background-image: url('bg.jpg'), url('bg.jpeg'), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* لوحة التحكم */
        .admin-panel {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.9); padding: 20px;
            border-radius: 15px; border: 1px solid var(--glow-cyan);
            z-index: 1000; width: 220px; transition: 0.3s;
        }
        .admin-panel.hidden { transform: translateX(250px); opacity: 0; pointer-events: none; }

        .toggle-admin {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.6); border: 1px solid white;
            color: white; padding: 8px 15px; border-radius: 8px;
            cursor: pointer; z-index: 999;
        }

        .main-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 24px;
            width: 90%; max-width: 800px; text-align: center;
        }

        .header-area { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .logo-text { font-size: 3rem; font-weight: 900; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px var(--glow-cyan); }
        
        /* حاوية الشعار */
        .logo-container {
            width: 80px; height: 80px;
            border: 2px solid white; border-radius: 12px;
            overflow: hidden; background: #111;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* الميزان */
        .balance-box { height: 100px; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 50px; }
        .beam { width: 400px; height: 5px; background: white; position: relative; transition: transform 0.7s ease-out; }
        .basket { 
            width: 90px; height: 50px; border: 2px solid white; 
            background: rgba(0,0,0,0.7); position: absolute; bottom: -50px; 
            border-radius: 0 0 45px 45px; display: flex; flex-direction: column; justify-content: center; 
        }
        .basket-l { left: -45px; } .basket-r { right: -45px; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 500px; margin: 0 auto; }
        .btn { 
            background: rgba(255,255,255,0.1); border: 1px solid white; 
            color: white; padding: 15px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; 
        }
        .btn:hover { background: var(--glow-cyan); }
    </style>
</head>
<body>

    <button class="toggle-admin" onclick="toggleAdmin()">⚙️ الإعدادات</button>

    <div class="admin-panel" id="admin-panel">
        <input type="text" id="n1" placeholder="اسم الفريق 1" style="width:100%; margin-bottom:5px;">
        <input type="text" id="n2" placeholder="اسم الفريق 2" style="width:100%; margin-bottom:5px;">
        <input type="number" id="limit" placeholder="الحد" style="width:100%; margin-bottom:10px;">
        <button onclick="apply()" style="width:100%; background:var(--glow-cyan); border:none; color:white; padding:10px; cursor:pointer;">حفظ</button>
    </div>

    <div class="main-card" id="card">
        <div class="header-area">
            <h1 class="logo-text">SOLAR</h1>
            <div class="logo-container">
                <img src="logo.png" onerror="this.src='logo.jpg'; this.onerror=function(){this.src='logo.jpeg';};">
            </div>
        </div>

        <div style="font-size: 2rem; margin-bottom: 20px;">المجموع: <span id="total">0</span></div>

        <div class="balance-box">
            <div class="beam" id="beam">
                <div class="basket basket-l"><small id="ln1">الفريق 1</small><b id="s1">0</b></div>
                <div class="basket basket-r"><small id="ln2">الفريق 2</small><b id="s2">0</b></div>
            </div>
        </div>

        <div class="grid">
            <script>
                for(let i=1; i<=10; i++) document.write(`<button class="btn" onclick="play(${i})">${i}</button>`);
            </script>
        </div>
    </div>

    <script>
        let total=0, t1=0, t2=0, turn=1, max=80;
        function toggleAdmin() { document.getElementById('admin-panel').classList.toggle('hidden'); }
        function apply() {
            max = parseInt(document.getElementById('limit').value) || 80;
            document.getElementById('ln1').innerText = document.getElementById('n1').value || "الفريق 1";
            document.getElementById('ln2').innerText = document.getElementById('n2').value || "الفريق 2";
            toggleAdmin(); reset();
        }
        function play(v) {
            total += v;
            if(turn===1) { t1+=v; document.getElementById('s1').innerText=t1; turn=2; }
            else { t2+=v; document.getElementById('s2').innerText=t2; turn=1; }
            document.getElementById('total').innerText = total;
            let angle = (t1-t2)*-2;
            document.getElementById('beam').style.transform = `rotate(${angle}deg)`;
            if(total >= max) { alert("انفجر الميزان!"); reset(); }
        }
        function reset() {
            total=0; t1=0; t2=0; turn=1;
            document.getElementById('total').innerText="0";
            document.getElementById('s1').innerText="0";
            document.getElementById('s2').innerText="0";
            document.getElementById('beam').style.transform="rotate(0deg)";
        }
    </script>
</body>
</html>
