<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان سولار - Solar Balance</title>
    <style>
        :root {
            --glow-cyan: #4facfe;
            --neon-blue: #00f2fe;
            --danger: #ff4b2b;
            --galaxy: linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b, #4facfe);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050510;
            color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            position: relative;
        }

        .animated-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpd') center/cover no-repeat;
            z-index: -2; animation: spaceMove 40s linear infinite alternate;
        }
        @keyframes spaceMove { from { transform: scale(1.1); } to { transform: scale(1.2); } }

        /* شاشة WASTED */
        #wasted-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center;
        }
        #wasted-screen h1 { font-size: 8rem; color: #ff0000; text-shadow: 0 0 20px #600; letter-spacing: 15px; transform: skewX(-10deg); }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 4000;
            justify-content: center; align-items: center;
        }
        .content-box { background: rgba(20,20,40,0.95); padding: 30px; border-radius: 20px; border: 2px solid var(--glow-cyan); max-width: 400px; text-align: right; line-height: 1.6; }

        .admin-panel {
            position: absolute; top: 70px; right: 20px; background: rgba(0,0,0,0.95);
            padding: 20px; border-radius: 15px; border: 1px solid var(--neon-blue);
            z-index: 1001; width: 280px; max-height: 80vh; overflow-y: auto; transition: 0.3s;
        }
        .admin-panel.hidden { transform: translateX(400px); opacity: 0; pointer-events: none; }
        .admin-panel label { font-size: 0.8rem; color: var(--neon-blue); display: block; margin-top: 10px; }
        .admin-panel input, .admin-panel select { width: 100%; padding: 8px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; }

        .main-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px;
            border-radius: 30px; width: 95%; max-width: 850px; text-align: center; position: relative; z-index: 2;
        }
        .main-card.paused { opacity: 0.3; pointer-events: none; }

        /* الشعار وكلمة SOLAR بجانبه */
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; flex-direction: row-reverse; }
        .logo-box { 
            width: 70px; height: 70px; 
            border: 2px solid #fff; 
            border-radius: 15px; 
            background: url('logo.png') center/cover no-repeat; 
        }
        .logo-text { font-size: 3.5rem; font-weight: 900; letter-spacing: 8px; background: var(--galaxy); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        /* الميزان المرفوع */
        .balance-area { height: 220px; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 80px; position: relative; }
        .beam { 
            width: 480px; height: 6px; background: #fff; position: absolute; bottom: 100px; left: 50%;
            margin-left: -240px; transition: transform 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 5;
        }
        .basket-container { position: absolute; top: 0; transition: transform 0.7s; }
        .basket-l { left: -10px; } .basket-r { right: -10px; }
        .strings { width: 120px; height: 100px; position: relative; }
        .strings::before, .strings::after { content: ''; position: absolute; top: 0; width: 1px; height: 105px; background: rgba(255,255,255,0.4); }
        .strings::before { left: 10px; transform: rotate(-35deg); transform-origin: top; }
        .strings::after { right: 10px; transform: rotate(35deg); transform-origin: top; }
        .cup { width: 130px; height: 55px; background: rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.4); border-radius: 0 0 70px 70px; display: flex; justify-content: center; align-items: center; }
        .score-box { background: rgba(0,0,0,0.5); border: 1px solid #fff; padding: 2px 12px; border-radius: 5px; font-size: 1.8rem; font-weight: bold; }
        .pivot-triangle { width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-bottom: 100px solid rgba(255,255,255,0.2); position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); }

        /* الأزرار */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 500px; margin: 0 auto; }
        .num-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 15px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; }
        .num-btn:disabled { opacity: 0.1; border-color: red; }

        #event-msg { display: none; position: fixed; top: 15%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid var(--neon-blue); padding: 10px 30px; border-radius: 50px; z-index: 5000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="wasted-screen"><h1>WASTED</h1></div>
    <div class="animated-bg"></div>
    <div id="event-msg">حدث فجائي!</div>

    <div class="overlay" id="rules-box">
        <div class="content-box">
            <h2 style="color:var(--danger)">📜 شروط المعركة</h2>
            <p>1. ممنوع اختيار نفس الرقم مرتين متتاليتين.</p>
            <p>2. إذا انتهى الوقت، تخسر الجولة فوراً.</p>
            <button onclick="toggleOverlay('rules-box')" style="width:100%; padding:10px; background:var(--danger); border:none; color:white; border-radius:8px; cursor:pointer;">موافق</button>
        </div>
    </div>

    <div class="overlay" id="info-box">
        <div class="content-box">
            <h2 style="color:var(--glow-cyan)">ℹ️ شرح الأحداث</h2>
            <p>🕳️ <b>الثقب الأسود:</b> يخصم من المجموع.</p>
            <p>☄️ <b>عاصفة نيازك:</b> تزيد من المجموع.</p>
            <button onclick="toggleOverlay('info-box')" style="width:100%; padding:10px; background:var(--glow-cyan); border:none; color:white; border-radius:8px; cursor:pointer;">فهمت</button>
        </div>
    </div>

    <div class="controls-top" style="position: absolute; top:20px; right:20px; display:flex; gap:10px; z-index:1000;">
        <button class="btn-ctrl" onclick="toggleOverlay('rules-box')" style="background:none; border:1px solid #fff; color:white; padding:8px; border-radius:8px; cursor:pointer;">📜 الشروط</button>
        <button class="btn-ctrl" onclick="toggleOverlay('info-box')" style="background:none; border:1px solid #fff; color:white; padding:8px; border-radius:8px; cursor:pointer;">ℹ️ الأحداث</button>
        <button class="btn-ctrl" onclick="togglePause()" id="p-btn" style="background:var(--glow-cyan); border:none; padding:8px 15px; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">ابدأ اللعب ▶️</button>
        <button class="btn-ctrl" onclick="toggleAdmin()" style="background:rgba(0,0,0,0.5); border:1px solid #fff; color:white; padding:8px; border-radius:8px; cursor:pointer;">⚙️</button>
    </div>

    <div class="admin-panel hidden" id="admin">
        <label>فريق 1:</label><input type="text" id="n1-in" value="فريق 1">
        <label>فريق 2:</label><input type="text" id="n2-in" value="فريق 2">
        <label>حد الانفجار:</label><input type="number" id="limit-in" value="0">
        <label>الوقت (ثواني):</label><input type="number" id="time-in" value="0">
        <label>تشغيل الأحداث؟</label><select id="ev-t"><option value="on">نعم</option><option value="off">لا</option></select>
        <label>قيمة الزيادة (+):</label><input type="number" id="plus-v" value="0">
        <label>قيمة النقص (-):</label><input type="number" id="minus-v" value="0">
        <button onclick="applySettings()" style="width:100%; background:var(--neon-blue); border:none; color:white; padding:10px; margin-top:10px; cursor:pointer; font-weight:bold;">حفظ</button>
    </div>

    <div class="main-card paused" id="game-card">
        <div id="timer" style="font-size: 2.2rem; color: var(--danger); font-weight: bold;">0</div>
        <div class="logo-area">
            <h1 class="logo-text">SOLAR</h1>
            <div class="logo-box"></div>
        </div>
        <div style="margin-bottom: 10px;">المجموع الكلي: <span id="total-val">0</span></div>

        <div class="balance-area">
            <div class="beam" id="beam">
                <div class="basket-container basket-l active-turn" id="cont1">
                    <small id="t1-n" style="position:absolute; top:-70px; width:100px; left:10px;">فريق 1</small>
                    <div class="strings"></div>
                    <div class="cup"><div class="score-box" id="s1">0</div></div>
                </div>
                <div class="basket-container basket-r" id="cont2">
                    <small id="t2-n" style="position:absolute; top:-70px; width:100px; right:10px;">فريق 2</small>
                    <div class="strings"></div>
                    <div class="cup"><div class="score-box" id="s2">0</div></div>
                </div>
            </div>
            <div class="pivot-triangle"></div>
        </div>

        <div class="grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn" id="btn-${i}" onclick="play(${i})">${i}</button>`);</script>
        </div>
    </div>

    <script>
        let total=0, t1=0, t2=0, turn=1, max=0, timeLeft=0, timeLimit=0, timerId, isPaused=true, moves=0;
        let n1="فريق 1", n2="فريق 2", evOn=true, pV=0, mV=0, lastT1=null, lastT2=null;

        function toggleOverlay(id) { const el = document.getElementById(id); el.style.display = (el.style.display==='flex')?'none':'flex'; }
        function toggleAdmin() { document.getElementById('admin').classList.toggle('hidden'); }
        
        function togglePause() {
            if(max === 0 || timeLimit === 0) { alert("أدخل الإعدادات أولاً!"); return; }
            isPaused = !isPaused;
            document.getElementById('p-btn').innerText = isPaused ? "استكمال ▶️" : "إيقاف مؤقت ⏸️";
            document.getElementById('game-card').classList.toggle('paused', isPaused);
            if(!isPaused) startTimer(); else clearInterval(timerId);
        }

        function startTimer() {
            clearInterval(timerId); timeLeft = timeLimit;
            document.getElementById('timer').innerText = timeLeft;
            timerId = setInterval(() => {
                if(!isPaused) {
                    timeLeft--; document.getElementById('timer').innerText = timeLeft;
                    if(timeLeft <= 0) endGame();
                }
            }, 1000);
        }

        function applySettings() {
            n1 = document.getElementById('n1-in').value;
            n2 = document.getElementById('n2-in').value;
            max = parseInt(document.getElementById('limit-in').value);
            timeLimit = parseInt(document.getElementById('time-in').value);
            evOn = document.getElementById('ev-t').value === 'on';
            pV = parseInt(document.getElementById('plus-v').value);
            mV = parseInt(document.getElementById('minus-v').value);
            
            document.getElementById('t1-n').innerText = n1;
            document.getElementById('t2-n').innerText = n2;
            document.getElementById('timer').innerText = timeLimit;
            toggleAdmin(); reset();
        }

        function play(v) {
            if(isPaused) return;
            total += v; moves++;
            if(turn === 1) { t1 += v; lastT1 = v; turn = 2; updateBtns(lastT2); }
            else { t2 += v; lastT2 = v; turn = 1; updateBtns(lastT1); }
            updateUI();
            if(evOn && moves % 5 === 0) triggerEvent();
            if(total >= max) endGame(); else startTimer();
        }

        function updateBtns(blocked) { for(let i=1; i<=10; i++) document.getElementById(`btn-${i}`).disabled = (i === blocked); }

        function triggerEvent() {
            const evs = [`🕳️ ثقب أسود: -${mV}`, `☄️ نيازك: +${pV}`, "🔋 شحن: الوقت 15ث"];
            const r = Math.floor(Math.random() * 3);
            const m = document.getElementById('event-msg');
            m.innerText = evs[r]; m.style.display = 'block';
            if(r===0) total = Math.max(0, total - mV);
            if(r===1) total += pV;
            if(r===2) timeLeft = 15;
            updateUI();
            setTimeout(() => m.style.display = 'none', 3000);
        }

        function updateUI() {
            document.getElementById('total-val').innerText = total;
            document.getElementById('s1').innerText = t1;
            document.getElementById('s2').innerText = t2;
            let angle = Math.max(-25, Math.min(25, (t1 - t2) * -1.8));
            document.getElementById('beam').style.transform = `rotate(${angle}deg)`;
            document.getElementById('cont1').style.transform = `rotate(${-angle}deg)`;
            document.getElementById('cont2').style.transform = `rotate(${-angle}deg)`;
            document.getElementById('cont1').classList.toggle('active-turn', turn===1);
            document.getElementById('cont2').classList.toggle('active-turn', turn===2);
        }

        function endGame() {
            clearInterval(timerId);
            document.getElementById('wasted-screen').style.display = 'flex';
            setTimeout(() => location.reload(), 3000);
        }

        function reset() {
            total=0; t1=0; t2=0; turn=1; moves=0; lastT1=null; lastT2=null;
            updateUI(); updateBtns(null);
        }
    </script>
</body>
</html>
