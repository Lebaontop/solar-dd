<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان سولار - Solar Balance </title>
    <style>
        :root {
            --glow-cyan: #4facfe;
            --neon-blue: #00f2fe;
            --danger: #ff4b2b;
            --galaxy: linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b, #4facfe);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050510;
            color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            position: relative;
        }

        .animated-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpd') center/cover no-repeat;
            z-index: -2;
        }

        #wasted-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center;
        }
        #wasted-screen h1 { font-size: 8rem; color: #ff0000; text-shadow: 0 0 20px #600; letter-spacing: 15px; transform: skewX(-10deg); }

        .admin-panel {
            position: absolute; top: 100px; right: 20px; background: rgba(0,0,0,0.95);
            padding: 15px; border-radius: 15px; border: 1px solid var(--neon-blue);
            z-index: 1001; width: 260px; max-height: 75vh; overflow-y: auto; transition: 0.3s;
        }
        .admin-panel.hidden { transform: translateX(400px); opacity: 0; pointer-events: none; }
        .admin-panel label { font-size: 0.75rem; color: var(--neon-blue); display: block; margin-top: 8px; }
        .admin-panel input, .admin-panel select { width: 100%; padding: 6px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }

        .main-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px;
            border-radius: 30px; width: 95%; max-width: 800px; text-align: center; position: relative; z-index: 2;
            transition: 0.5s;
        }
        .main-card.danger-zone { border-color: var(--danger); box-shadow: 0 0 40px var(--danger); animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }

        .logo-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; flex-direction: row-reverse; }
        .logo-box { width: 60px; height: 60px; border: 2px solid #fff; border-radius: 12px; background: url('logo.png') center/cover no-repeat; }
        .logo-text { font-size: 2.8rem; font-weight: 900; letter-spacing: 5px; background: var(--galaxy); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        .balance-area { height: 280px; position: relative; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 40px; }
        .beam { width: 440px; height: 6px; background: #fff; position: absolute; bottom: 160px; transition: transform 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 5; }
        .basket-anchor { position: absolute; top: 0; display: flex; flex-direction: column; align-items: center; transition: transform 0.7s; }
        .strings { width: 100px; height: 110px; position: relative; }
        .strings::before, .strings::after { content: ''; position: absolute; top: 0; width: 1.5px; height: 115px; background: rgba(255,255,255,0.4); }
        .strings::before { left: 8px; transform: rotate(-30deg); transform-origin: top; }
        .strings::after { right: 8px; transform: rotate(30deg); transform-origin: top; }
        .cup { width: 110px; height: 50px; background: rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.4); border-radius: 0 0 60px 60px; display: flex; justify-content: center; align-items: center; }
        .score-box { background: rgba(0,0,0,0.5); border: 1px solid #fff; padding: 2px 10px; border-radius: 5px; font-size: 1.6rem; font-weight: bold; }
        .pivot-triangle { width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-bottom: 160px solid rgba(255,255,255,0.1); position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 500px; margin: 0 auto; position: relative; z-index: 10; }
        .num-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 15px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .num-btn:hover:not(:disabled) { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); transform: scale(1.05); }
        .num-btn:disabled { opacity: 0.1; }

        .timer-danger { color: #ff0000 !important; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        #event-msg { display: none; position: fixed; top: 15%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid var(--neon-blue); padding: 10px 30px; border-radius: 50px; z-index: 5000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="wasted-screen"><h1>WASTED</h1></div>
    <div class="animated-bg"></div>
    <div id="event-msg">حدث فجائي!</div>

    <div class="controls-top" style="position: absolute; top:20px; right:20px; display:flex; gap:10px; z-index:1000;">
        <button class="btn-ctrl" onclick="togglePause()" id="p-btn" style="background:var(--glow-cyan); border:none; padding:8px 15px; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">ابدأ ▶️</button>
        <button class="btn-ctrl" onclick="toggleAdmin()" style="background:rgba(0,0,0,0.5); border:1px solid #fff; color:white; padding:8px 15px; border-radius:8px; cursor:pointer;">⚙️</button>
    </div>

    <div class="admin-panel hidden" id="admin">
        <label>فريق 1:</label><input type="text" id="n1-in">
        <label>فريق 2:</label><input type="text" id="n2-in">
        <label>الحد:</label><input type="number" id="limit-in">
        <label>الوقت:</label><input type="number" id="time-in">
        <label>تشغيل الأحداث؟</label><select id="ev-t"><option value="on">نعم</option><option value="off">لا</option></select>
        <label>تأثير منطقة الخطر؟</label><select id="danger-t"><option value="on">تشغيل</option><option value="off">إيقاف</option></select>
        <label>زيادة النيازك (+):</label><input type="number" id="plus-v">
        <label>نقص الثقب (-):</label><input type="number" id="minus-v">
        <button onclick="applySettings()" style="width:100%; background:var(--neon-blue); padding:10px; color:white; border:none; cursor:pointer; font-weight:bold; margin-top:10px;">حفظ وتطبيق</button>
    </div>

    <div class="main-card paused" id="game-card">
        <div id="timer" style="font-size: 2.5rem; color: var(--danger); font-weight: bold;">0</div>
        <div class="logo-area"><h1 class="logo-text">SOLAR</h1><div class="logo-box"></div></div>
        <div style="margin-bottom: 10px;">المجموع: <span id="total-val">0</span></div>

        <div class="balance-area">
            <div class="beam" id="beam">
                <div class="basket-anchor" style="left:-10px;" id="cont1">
                    <small id="t1-n" style="position:absolute; top:-70px; width:100px;">فريق 1</small>
                    <div class="strings"></div>
                    <div class="cup"><div class="score-box" id="s1">0</div></div>
                </div>
                <div class="basket-anchor" style="right:-10px;" id="cont2">
                    <small id="t2-n" style="position:absolute; top:-70px; width:100px;">فريق 2</small>
                    <div class="strings"></div>
                    <div class="cup"><div class="score-box" id="s2">0</div></div>
                </div>
            </div>
            <div class="pivot-triangle"></div>
        </div>

        <div class="grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn" id="btn-${i}" onclick="play(${i})">${i}</button>`);</script>
        </div>
        <div id="turn-txt" style="margin-top:15px; font-weight:bold; color:var(--neon-blue);">بانتظار البدء...</div>
    </div>

    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="sound-boom" src="https://assets.mixkit.co/active_storage/sfx/147/147-preview.mp3"></audio>

    <script>
        let total=0, t1=0, t2=0, turn=1, max=0, timeLeft=0, timeLimit=0, timerId, isPaused=true, moves=0;
        let pV=0, mV=0, evOn=true, dangerOn=true, dangerLimit=15, lastT1=null, lastT2=null;

        window.onload = () => {
            const s = JSON.parse(localStorage.getItem('solarSettings'));
            if(s) {
                document.getElementById('n1-in').value = s.n1; document.getElementById('n2-in').value = s.n2;
                document.getElementById('limit-in').value = s.max; document.getElementById('time-in').value = s.time;
                document.getElementById('plus-v').value = s.plusV || 0; document.getElementById('minus-v').value = s.minusV || 0;
                document.getElementById('ev-t').value = s.evOn ? "on" : "off";
                document.getElementById('danger-t').value = s.dangerOn ? "on" : "off";
                applySettings(false);
            }
        };

        function toggleAdmin() { document.getElementById('admin').classList.toggle('hidden'); }
        function togglePause() {
            if(max <= 0) { alert("أدخل الإعدادات أولاً!"); return; }
            isPaused = !isPaused;
            document.getElementById('p-btn').innerText = isPaused ? "استكمال ▶️" : "إيقاف ⏸️";
            document.getElementById('game-card').classList.toggle('paused', isPaused);
            if(!isPaused) startTimer(); else clearInterval(timerId);
            updateUI();
        }

        function applySettings(close = true) {
            const settings = {
                n1: document.getElementById('n1-in').value || "فريق 1", n2: document.getElementById('n2-in').value || "فريق 2",
                max: parseInt(document.getElementById('limit-in').value) || 0, time: parseInt(document.getElementById('time-in').value) || 0,
                plusV: parseInt(document.getElementById('plus-v').value) || 0, minusV: parseInt(document.getElementById('minus-v').value) || 0,
                evOn: document.getElementById('ev-t').value === "on",
                dangerOn: document.getElementById('danger-t').value === "on"
            };
            localStorage.setItem('solarSettings', JSON.stringify(settings));
            max = settings.max; timeLimit = settings.time; pV = settings.plusV; mV = settings.minusV; 
            evOn = settings.evOn; dangerOn = settings.dangerOn;
            dangerLimit = Math.floor(Math.random() * 11) + 10; 
            
            document.getElementById('t1-n').innerText = settings.n1; document.getElementById('t2-n').innerText = settings.n2;
            if(close) { toggleAdmin(); reset(); }
        }

        function startTimer() {
            clearInterval(timerId); timeLeft = timeLeft > 0 ? timeLeft : timeLimit;
            document.getElementById('timer').innerText = timeLeft;
            timerId = setInterval(() => { if(!isPaused) { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft <= 0) endGame(); } }, 1000);
        }

        function play(v) {
            if(isPaused) return;
            document.getElementById('sound-click').play();
            total += v; moves++;
            if(turn === 1) { t1 += v; lastT1 = v; turn = 2; updateBtns(lastT2); }
            else { t2 += v; lastT2 = v; turn = 1; updateBtns(lastT1); }
            updateUI(); if(evOn && moves % 5 === 0) triggerEvent();
            if(total >= max) endGame(); else { timeLeft = timeLimit; startTimer(); }
        }

        function updateBtns(blocked) { for(let i=1; i<=10; i++) document.getElementById(`btn-${i}`).disabled = (i === blocked); }

        function triggerEvent() {
            const r = Math.floor(Math.random()*2); // تم تعديلها لتختار بين حدثين فقط (0 أو 1)
            let msg = "";
            if(r === 0) { total = Math.max(0, total - mV); msg = `🕳️ ثقب: -${mV}`; }
            else { total += pV; msg = `☄️ نيزك: +${pV}`; }
            const m = document.getElementById('event-msg'); m.innerText = msg; m.style.display = 'block';
            updateUI(); setTimeout(() => m.style.display = 'none', 3000);
        }

        function updateUI() {
            document.getElementById('total-val').innerText = total;
            document.getElementById('s1').innerText = t1; document.getElementById('s2').innerText = t2;
            
            const card = document.getElementById('game-card');
            const timerEl = document.getElementById('timer');
            if(dangerOn && max - total <= dangerLimit && max !== 0) {
                card.classList.add('danger-zone');
                timerEl.classList.add('timer-danger');
            } else {
                card.classList.remove('danger-zone');
                timerEl.classList.remove('timer-danger');
            }

            let angle = Math.max(-25, Math.min(25, (t1 - t2) * -1.8));
            document.getElementById('beam').style.transform = `rotate(${angle}deg)`;
            document.getElementById('cont1').style.transform = `rotate(${-angle}deg)`;
            document.getElementById('cont2').style.transform = `rotate(${-angle}deg)`;
            const name = turn === 1 ? document.getElementById('t1-n').innerText : document.getElementById('t2-n').innerText;
            document.getElementById('turn-txt').innerText = isPaused ? "متوقف" : `دور: ${name}`;
        }

        function endGame() { 
            clearInterval(timerId); document.getElementById('sound-boom').play();
            document.getElementById('wasted-screen').style.display = 'flex'; 
            setTimeout(() => location.reload(), 3000); 
        }

        function reset() { 
            total=0; t1=0; t2=0; turn=1; moves=0; lastT1=null; lastT2=null; timeLeft = timeLimit; updateUI(); updateBtns(null); 
        }
    </script>
</body>
</html>
