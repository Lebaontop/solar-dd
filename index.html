<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان سولار - Solar Balance PRO</title>
    <style>
        :root {
            --glow-cyan: #4facfe;
            --neon-blue: #00f2fe;
            --galaxy-start: #3a1c71;
            --galaxy-mid: #d76d77;
            --galaxy-end: #ffaf7b;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #050510 url('bg.jpd') center/cover no-repeat fixed;
            color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            position: relative;
        }

        /* تأثير النجوم المتحركة */
        .stars-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: moveStar linear infinite, twinkle 2s ease-in-out infinite; }
        @keyframes moveStar { from { transform: translateY(0px); } to { transform: translateY(-1000px); } }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .controls-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-control { background: rgba(0,0,0,0.6); border: 1px solid white; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }

        .admin-panel { position: absolute; top: 70px; right: 20px; background: rgba(0,0,0,0.95); padding: 20px; border-radius: 15px; border: 1px solid var(--neon-blue); z-index: 1001; width: 240px; transition: 0.3s; }
        .admin-panel.hidden { transform: translateX(300px); opacity: 0; pointer-events: none; }
        .admin-panel input { width: 100%; margin-bottom: 10px; padding: 8px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }

        .main-card {
            background-color: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px; border-radius: 30px;
            width: 90%; max-width: 850px; text-align: center;
            position: relative; z-index: 2; box-shadow: 0 0 80px rgba(0, 0, 0, 0.6);
            transition: opacity 0.3s, transform 0.1s;
        }
        .main-card.paused { opacity: 0.4; pointer-events: none; }

        .header-area { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .logo-text { font-size: 3.5rem; font-weight: 900; letter-spacing: 10px; background: linear-gradient(135deg, var(--galaxy-start) 0%, var(--galaxy-mid) 50%, var(--galaxy-end) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .logo-img { width: 85px; height: 85px; border: 2px solid white; border-radius: 15px; background: url('logo.png') center/cover no-repeat; }

        /* ميزان الصورة المحدث */
        .balance-box { height: 160px; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 60px; position: relative; }
        .new-beam { 
            width: 460px; height: 6px; 
            background: linear-gradient(90deg, transparent, #fff, transparent); 
            position: relative; transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .basket { 
            width: 100px; height: 75px; 
            border: 2px solid white; background: rgba(0,0,0,0.7); 
            position: absolute; bottom: -75px; border-radius: 8px; 
            display: flex; flex-direction: column; justify-content: center;
        }
        .basket-l { left: -50px; } .basket-r { right: -50px; }
        .team-title { font-size: 0.75rem; margin-bottom: 5px; opacity: 0.8; }
        .weight-txt { font-size: 1.8rem; font-weight: bold; }
        
        .active-turn { border-color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); border-width: 3px; }

        .pivot-container { position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .pivot-point { width: 15px; height: 15px; background: #fff; border-radius: 50%; margin-bottom: -5px; z-index: 3; }
        .pivot-triangle { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 35px solid rgba(255,255,255,0.4); }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 550px; margin: 0 auto; }
        .btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 18px; font-size: 1.3rem; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--neon-blue); transform: translateY(-3px); }

        #timer-display { font-size: 2.5rem; color: #ff4b2b; font-weight: bold; margin-bottom: 5px; }

        /* تأثيرات النهاية */
        .explosion-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0); z-index: 100; pointer-events: none; transition: background 0.2s; }
        .shake { animation: shake-card 0.1s infinite; }
        @keyframes shake-card { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, -3px); } }
    </style>
</head>
<body>

    <div class="explosion-overlay" id="boom-overlay"></div>
    <div class="stars-container" id="stars"></div>

    <div class="controls-top">
        <button class="btn-control" onclick="togglePause()" id="pause-btn" style="background: var(--glow-cyan);">ابدأ اللعب ▶️</button>
        <button class="btn-control" onclick="toggleAdmin()">⚙️ الإعدادات</button>
    </div>

    <div class="admin-panel hidden" id="admin">
        <input type="text" id="n1-input" placeholder="اسم فريق 1">
        <input type="text" id="n2-input" placeholder="اسم فريق 2">
        <input type="number" id="limit-input" placeholder="حد الانفجار" value="80">
        <input type="number" id="time-input" placeholder="الوقت" value="10">
        <button onclick="applySettings()" style="width: 100%; background: var(--neon-blue); border: none; padding: 10px; color: white; font-weight: bold; cursor: pointer;">حفظ وتطبيق</button>
    </div>

    <div class="main-card paused" id="game-card">
        <div id="timer-display">10</div>
        <div class="header-area">
            <h1 class="logo-text">SOLAR</h1>
            <div class="logo-img"></div>
        </div>
        <div style="font-size: 1.4rem; margin-bottom: 20px;">المجموع: <span id="total-val">0</span></div>
        
        <div class="balance-box">
            <div class="new-beam" id="beam">
                <div class="basket basket-l active-turn" id="b1"><small class="team-title" id="t1-name">فريق 1</small><b class="weight-txt" id="s1">0</b></div>
                <div class="basket basket-r" id="b2"><small class="team-title" id="t2-name">فريق 2</small><b class="weight-txt" id="s2">0</b></div>
            </div>
            <div class="pivot-container">
                <div class="pivot-point"></div>
                <div class="pivot-triangle"></div>
            </div>
        </div>

        <div class="grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="btn" onclick="play(${i})">${i}</button>`);</script>
        </div>
        <div id="turn-info" style="margin-top:20px;">دور: <span id="active-team-txt">الفريق 1</span></div>
    </div>

    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="sound-boom" src="https://assets.mixkit.co/active_storage/sfx/147/147-preview.mp3"></audio>

    <script>
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 50 + 40) + 's';
                container.appendChild(star);
            }
        }
        createStars();

        let total = 0, t1 = 0, t2 = 0, turn = 1, max = 80, timeLimit = 10, timeLeft = 10, timerId, isPaused = true;
        let name1 = "فريق 1", name2 = "فريق 2";

        function toggleAdmin() { document.getElementById('admin').classList.toggle('hidden'); }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pause-btn');
            const card = document.getElementById('game-card');
            if(isPaused) {
                clearInterval(timerId);
                btn.innerText = "استكمال ▶️";
                card.classList.add('paused');
            } else {
                btn.innerText = "إيقاف مؤقت ⏸️";
                card.classList.remove('paused');
                startTimer();
            }
        }

        function startTimer() {
            clearInterval(timerId);
            timerId = setInterval(() => {
                if(!isPaused) {
                    timeLeft--;
                    document.getElementById('timer-display').innerText = timeLeft;
                    if(timeLeft <= 0) endGame("انتهى الوقت!");
                }
            }, 1000);
        }

        function applySettings() {
            name1 = document.getElementById('n1-input').value || "فريق 1";
            name2 = document.getElementById('n2-input').value || "فريق 2";
            max = parseInt(document.getElementById('limit-input').value) || 80;
            timeLimit = parseInt(document.getElementById('time-input').value) || 10;
            document.getElementById('t1-name').innerText = name1;
            document.getElementById('t2-name').innerText = name2;
            toggleAdmin(); reset();
        }

        function play(v) {
            if(isPaused) return;
            document.getElementById('sound-click').play();
            total += v;
            if(turn === 1) {
                t1 += v; document.getElementById('s1').innerText = t1;
                turn = 2; document.getElementById('b1').classList.remove('active-turn'); document.getElementById('b2').classList.add('active-turn');
                document.getElementById('active-team-txt').innerText = name2;
            } else {
                t2 += v; document.getElementById('s2').innerText = t2;
                turn = 1; document.getElementById('b2').classList.remove('active-turn'); document.getElementById('b1').classList.add('active-turn');
                document.getElementById('active-team-txt').innerText = name1;
            }
            document.getElementById('total-num').innerText = total;
            document.getElementById('beam').style.transform = `rotate(${(t1 - t2) * -1.8}deg)`;
            
            if(total >= max) endGame("انفجر الميزان!");
            else { timeLeft = timeLimit; document.getElementById('timer-display').innerText = timeLeft; }
        }

        function endGame(msg) {
            clearInterval(timerId);
            document.getElementById('sound-boom').play();
            document.getElementById('boom-overlay').style.background = "rgba(255, 0, 0, 0.6)";
            document.getElementById('game-card').classList.add('shake');
            
            setTimeout(() => {
                alert(msg);
                document.getElementById('boom-overlay').style.background = "transparent";
                document.getElementById('game-card').classList.remove('shake');
                reset();
            }, 500);
        }

        function reset() {
            total = 0; t1 = 0; t2 = 0; turn = 1; timeLeft = timeLimit;
            document.getElementById('total-val').innerText = "0";
            document.getElementById('s1').innerText = "0"; document.getElementById('s2').innerText = "0";
            document.getElementById('beam').style.transform = "rotate(0deg)";
            document.getElementById('timer-display').innerText = timeLeft;
            document.getElementById('active-team-txt').innerText = name1;
            document.getElementById('b1').classList.add('active-turn');
            document.getElementById('b2').classList.remove('active-turn');
            if(!isPaused) startTimer();
        }
    </script>
</body>
</html>
